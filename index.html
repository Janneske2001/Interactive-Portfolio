<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Portfolio Jannes</title>
  </head>
  <body>
    <div id="gyro-indicator" style="position: fixed; bottom: 20px; right: 20px; z-index: 9998; background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 20px; font-size: 12px; color: #00ffff; font-family: monospace; backdrop-filter: blur(5px); display: none; pointer-events: none;">
      🎮 Motion Control
    </div>
    <div id="project-panel" class="hidden">
      <h1 id="project-title" class="panel-item"></h1>
      <img id="project-image" class="panel-item" />
      <p id="project-description" class="panel-item"></p>
      <p id="project-role" class="panel-item"></p>
      <div id="project-tech" class="panel-item"></div>
      <a id="project-link" class="panel-item" target="_blank">View Project</a>
      <button id="close-project" class="panel-item">Back</button>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
